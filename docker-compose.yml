version: '3.8'

services:
  picstory-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: picstory-web
    ports:
      - '8080:8080'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    # 볼륨 마운트 (필요한 경우)
